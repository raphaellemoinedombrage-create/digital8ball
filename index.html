<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bally</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #3759bd;
  color: white;
  font-family: Arial, sans-serif;
  min-height: 100vh;
}

.answer {
  text-align: center;
  font-size: 30px;
  margin-top: 100px;
  padding: 20px;
}

.input-box {
  position: fixed;
  bottom: 20px;
  left: 20px;
  right: 20px;
  display: flex;
  background: #40414f;
  border-radius: 20px;
  padding: 8px;
}

input {
  flex: 1;
  border: none;
  outline: none;
  background: transparent;
  color: white;
  font-size: 18px;
  padding: 12px;
}

button {
  border: none;
  background: #19c37d;
  color: white;
  border-radius: 15px;
  padding: 12px 20px;
  font-size: 18px;
}
</style>
</head>
<body>

<div class="answer" id="answer">
  Ask Bally a question
</div>

<div class="input-box">
  <input id="text" placeholder="Type your question...">
  <button onclick="ask()">Ask</button>
</div>

<script>
const hackclubistuff = [
  "it is certain",
  "it is decidedly so",
  "without a doubt",
  "yes definitely",
  "you may rely on it",
  "as i see it, yes",
  "most likely",
  "outlook good",
  "yes",
  "signs point to yes",
  "reply hazy, try again",
  "ask again later",
  "better not tell you now",
  "cannot predict now",
  "concentrate and ask again",
  "dont count on it",
  "my reply is no",
  "my sources say no",
  "outlook not so good",
  "very doubtful"
];

function ask() {
  const input = document.getElementById("text");

  if (!input.value.trim()) return;

  document.getElementById("answer").textContent =
    hackclubistuff[Math.floor(Math.random() * hackclubistuff.length)];

  input.value = "";
}
</script>

</body>
</html>
