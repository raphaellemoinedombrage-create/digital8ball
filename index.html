<!DOCTYPE html>
<html>
<head>
<title>Bally</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #3759bd;
  color: white;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.answer {
  margin-top: 120px;
  font-size: 20px;
  text-align: center;
  width: 90%;
  max-width: 500px;
}

.input-box {
  display: flex;
  width: 90%;
  max-width: 400px;
  background: #40414f;
  border-radius: 20px;
  margin-top: auto;
  margin-bottom: 40px;
  padding: 6px;
  box-sizing: border-box;
}

input {
  flex: 1;
  border: none;
  outline: none;
  background: transparent;
  color: white;
  padding: 12px;
  font-size: 16px;
}

button {
  border: none;
  border-radius: 15px;
  background: #19c37d;
  color: white;
  padding: 10px 18px;
  font-size: 16px;
  cursor: pointer;
}

@media (max-width: 480px) {
  .answer {
    font-size: 18px;
    margin-top: 80px;
  }

  input {
    padding: 10px;
  }

  button {
    padding: 10px 14px;
  }
}
</style>
</head>

<body>

<div class="answer" id="answer">Ask Bally a question</div>

<div class="input-box">
  <input id="text" placeholder="Type your question...">
  <button onclick="ask()">Ask</button>
</div>

<script>


let hackclubistuff = [
  "it is certain",
  "it is decidedly so",
  "without a doubt",
  "yes definitely",
  "you may rely on it",
  "as i see it, yes",
  "most likely",
  "outlook good",
  "yes",
  "signs point to yes",
  "reply hazy, try again",
  "ask again later",
  "better not tell you now",
  "cannot predict now",
  "concentrate and ask again",
  "dont count on it",
  "my reply is no",
  "my sources say no",
  "outlook not so good",
  "very doubtful"
];

function ask(){
  let input = document.getElementById("text");
  if(!input.value.trim()) return;

  // same logic as Python random.choice()
  let r = hackclubistuff[Math.floor(Math.random() * hackclubistuff.length)];

  document.getElementById("answer").textContent = r;

  input.value = "";
}
</script>

</body>
</html>
